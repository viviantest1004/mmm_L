name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE (Installer + Portable)
        run: npm run build:win -- --publish never

      - name: List dist folder
        run: dir dist
        shell: cmd

      - name: Get version tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release and upload EXEs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "mmm_L ${{ steps.version.outputs.tag }}"
          body: |
            ## mmm_L ${{ steps.version.outputs.tag }} — Windows 빌드

            ### 다운로드 / Download

            | 파일 | 설명 |
            |------|------|
            | `mmm_L Setup *.exe` | **인스톨러** — 설치 후 사용 (권장 / Recommended) |
            | `mmm_L *.exe` (포터블) | **포터블** — 설치 없이 바로 실행 / No install needed |

            ### 실행 방법 / How to run
            - 인스톨러: 다운받아 실행 → 설치 → 바탕화면 mmm_L 아이콘 클릭
            - 포터블: 다운받아 바로 더블클릭

            > 오프라인에서도 완전히 동작합니다 / Works fully offline.
          files: |
            dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
