name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE (Installer + Portable)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: dir dist
        shell: cmd

      - name: Upload Installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: mmm_L-Setup-x64
          path: dist/*Setup*.exe
          if-no-files-found: warn

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: mmm_L-Portable-x64
          path: dist/*Portable*.exe
          if-no-files-found: warn

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Download Installer artifact
        uses: actions/download-artifact@v4
        with:
          name: mmm_L-Setup-x64
          path: ./release

      - name: Download Portable artifact
        uses: actions/download-artifact@v4
        with:
          name: mmm_L-Portable-x64
          path: ./release

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "mmm_L ${{ steps.version.outputs.tag }}"
          body: |
            ## mmm_L ${{ steps.version.outputs.tag }} — Windows 빌드

            ### 다운로드 / Download

            | 파일 | 설명 |
            |------|------|
            | `mmm_L Setup x64.exe` | **인스톨러** — 설치 후 사용 (권장) |
            | `mmm_L Portable x64.exe` | **포터블** — 설치 없이 바로 실행 |

            ### 설치 방법
            1. 인스톨러 또는 포터블 exe 다운로드
            2. 실행
            3. `.mmm` 파일을 열거나 코드를 직접 입력
            4. F5 또는 ▶ 실행 버튼으로 코드 실행

            > 오프라인에서도 완전히 동작합니다.
          files: ./release/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
