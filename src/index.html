<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>mmm_L</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── 툴바 ─────────────────────────── -->
<div id="toolbar">
  <div class="toolbar-brand">
    mmm_L <span>— IDE for mmm Programming Language</span>
  </div>
  <div class="toolbar-actions">
    <button class="btn" id="btn-new"  title="New File (Ctrl+N)">New</button>
    <button class="btn" id="btn-open" title="Open (Ctrl+O)">Open</button>
    <button class="btn" id="btn-save" title="Save (Ctrl+S)">Save</button>
    <button class="btn btn-run" id="btn-run" title="Run (F5)">▶ Run</button>
    <button class="btn" id="btn-help" title="Help (F1)">? Help</button>
  </div>
</div>

<!-- ─── 탭바 ─────────────────────────── -->
<div id="tabbar">
  <div class="tab active" id="tab-label">untitled.mmm</div>
</div>

<!-- ─── 메인 ─────────────────────────── -->
<div id="main">

  <!-- 에디터 -->
  <div id="editor-container">
    <div id="line-numbers"></div>
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"
      placeholder="# Enter mmm Programming Language code here.
# Please read the Help (F1) before you start."></textarea>
  </div>

  <!-- 터미널 패널 -->
  <div id="output-panel">
    <div id="output-header">
      <div class="term-title">Terminal — mmm_L [CMD]</div>
      <button class="btn-clear" id="btn-clear">cls</button>
    </div>
    <div id="output"></div>
  </div>

</div>

<!-- ─── 상태바 ─────────────────────── -->
<div id="statusbar">
  <span id="statusbar-left">mmm_L v1.0.0 — Ready</span>
  <div id="statusbar-right">
    <span id="status-cursor">Line 1, Col 1</span>
    <span>mmm Programming Language</span>
    <span>UTF-8</span>
  </div>
</div>

<!-- ─── 도움말 모달 ─────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">
      <span>mmm Programming Language Spec v1.0 (Must Read)</span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
